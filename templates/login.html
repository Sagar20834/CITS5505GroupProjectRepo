{% extends "base.html" %}

{% block title %}Login | RoadWatch Perth{% endblock %}

{% block content %}
  <div class="mx-auto max-w-xl rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 shadow-lg sm:p-8">
    <p class="mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700 dark:text-blue-300">Account Access</p>
    <h1 class="mb-3 text-3xl font-bold text-slate-900 dark:text-slate-100 sm:text-4xl">Login</h1>
    <p class="mb-8 text-lg leading-8 text-slate-600 dark:text-slate-300">Sign in to manage your reports, track issue status, and access dashboard analytics.</p>

    <form method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

      <div>
        <label for="identifier" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Username or email</label>
        <input id="identifier" name="identifier" value="{{ identifier }}" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" placeholder="e.g. perthresident or resident@example.com" required>
      </div>

      <div>
        <label for="password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Password</label>
        <input id="password" name="password" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="w-full rounded-2xl bg-blue-500 dark:bg-blue-600 px-6 py-4 text-lg font-semibold text-white hover:bg-blue-600">Login</button>
    </form>

    <p class="mt-4 text-base text-slate-600 dark:text-slate-300">Don't have an account? <a href="{{ url_for('auth.register') }}" class="font-medium text-blue-600 dark:text-blue-300">Register</a></p>
  </div>
{% endblock %}
