<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RoadWatch Perth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <nav class="bg-slate-900">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-6 py-5">
      <a href="index.html" class="text-4xl font-bold text-white no-underline">RoadWatch Perth</a>
      <div class="flex flex-wrap items-center gap-5 text-lg text-white">
        <a href="index.html" class="hover:text-amber-400">Home</a>
        <a href="report.html" class="hover:text-amber-400">Report Issue</a>
        <a href="dashboard.html" class="hover:text-amber-400">Dashboard</a>
        <a href="login.html" class="text-amber-400">Login</a>
        <a href="register.html" class="rounded-lg bg-green-500 px-5 py-2.5 font-semibold text-white no-underline hover:bg-green-600">Register</a>
      </div>
    </div>
  </nav>

  <main class="px-6 py-14">
    <div class="mx-auto max-w-xl rounded-2xl border border-slate-200 bg-white p-8 shadow-lg">
      <p class="mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700">Account Access</p>
      <h1 class="mb-3 text-4xl font-bold text-slate-900">Login</h1>
      <p class="mb-8 text-lg leading-8 text-slate-600">Sign in to manage reports and view your dashboard activity.</p>

      <div class="space-y-4">
        <input class="w-full rounded-xl border border-slate-300 px-4 py-3" placeholder="Username">
        <input class="w-full rounded-xl border border-slate-300 px-4 py-3" type="password" placeholder="Password">
      </div>

      <button type="button" class="mt-6 w-full rounded-2xl bg-blue-500 px-6 py-4 text-lg font-semibold text-white hover:bg-blue-600">Login</button>

      <p class="mt-4 text-base text-slate-600">Don't have an account? <a href="register.html" class="font-medium text-blue-600">Register</a></p>
    </div>
  </main>

  <footer class="bg-slate-900 py-4 text-center text-white">
    <p class="mb-0">RoadWatch Perth - Community reporting for safer roads.</p>
  </footer>
</body>
</html>
