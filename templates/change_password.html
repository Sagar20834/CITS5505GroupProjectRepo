{% extends "base.html" %}

{% block title %}Change Password | RoadWatch Perth{% endblock %}

{% block content %}
  <div class="mx-auto max-w-xl rounded-2xl border border-slate-200 bg-white p-8 shadow-lg dark:border-slate-700 dark:bg-slate-800">
    <p class="mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700 dark:text-blue-300">Account Security</p>
    <h1 class="mb-3 text-4xl font-bold text-slate-900 dark:text-slate-100">Change Password</h1>
    <p class="mb-8 text-lg leading-8 text-slate-600 dark:text-slate-300">Update your password using your current password for confirmation.</p>

    <form method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="current_password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Current password</label>
        <input id="current_password" name="current_password" type="password" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" required>
      </div>

      <div>
        <label for="new_password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">New password</label>
        <input id="new_password" name="new_password" type="password" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" required>
      </div>

      <div>
        <label for="confirm_password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" required>
      </div>

      <div class="flex flex-wrap gap-4">
        <button type="submit" class="rounded-2xl bg-blue-500 px-6 py-4 text-lg font-semibold text-white hover:bg-blue-600 dark:bg-blue-600">Save Password</button>
        <a href="{{ url_for('auth.profile') }}" class="rounded-2xl border border-slate-300 px-6 py-4 text-lg font-semibold text-slate-700 no-underline hover:bg-slate-50 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-700">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
