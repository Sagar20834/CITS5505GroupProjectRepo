<!DOCTYPE html>
<html>

<head>
    <title>RoadWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

    <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">RoadWatch</h1>

        <div class="space-x-3">

            <a href="index.html" class="hover:text-yellow-400">Home</a>
            <a href="report.html" class="hover:text-yellow-400">Report Issue</a>
            <a href="reports.html" class="hover:text-yellow-400">Reports</a>
            <!-- <a href="logout.html" class="bg-red-500 px-3 py-1 rounded">Logout</a> -->

            <!-- If admin  user then show this  -->
            <a href="dashboard.html" class="hover:text-yellow-400">Dashboard</a>
            <a href="login.html" class="bg-blue-500 px-3 py-1 rounded">Login</a>
            <a href="register.html" class="bg-green-500 px-3 py-1 rounded">Register</a>

        </div>
    </nav>



    <div>


        <div class="bg-gray-100 flex items-center justify-center h-1/2 mt-8">

            <div class="flex items-center justify-center w-1/2 ">
                <div class="bg-white p-6 rounded shadow w-full  text-center">
                    <h1 class="text-4xl font-bold">RoadWatch Perth</h1>
                    <p class="mt-3 text-gray-600">Report road issues easily</p>
                    <h2 class="text-xl font-bold mb-4">Road Issues Analytics</h2>
                    <canvas id="chart" class="w-full h-1/2"></canvas>


                </div>
            </div>
        </div>
        <script>
            const Utils = {
                numbers({ count, min, max }) {
                    return Array.from({ length: count }, () =>
                        Math.floor(Math.random() * (max - min + 1)) + min
                    );
                },
                labels(arr) {
                    return arr;
                },
                CHART_COLORS: {
                    red: "#EF4444",
                    blue: "#3B82F6",
                    green: "#10B981",
                    yellow: "#F59E0B"
                },
                months({ count }) {
                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    return monthNames.slice(0, count);
                }
            };

            const DATA_COUNT = 12;
            const NUMBER_CFG = { count: DATA_COUNT, min: 0, max: 100 };

            const labels = Utils.months({ count: 12 });  // Now using the months function
            const data = {
                labels: labels,
                datasets: [
                    {
                        label: 'Broken Road',
                        data: Utils.numbers(NUMBER_CFG),
                        backgroundColor: Utils.CHART_COLORS.red,
                    },
                    {
                        label: 'Crack',
                        data: Utils.numbers(NUMBER_CFG),
                        backgroundColor: Utils.CHART_COLORS.blue,
                    },
                    {
                        label: 'Pothhole',
                        data: Utils.numbers(NUMBER_CFG),
                        backgroundColor: Utils.CHART_COLORS.green,
                    },
                    {
                        label: 'Others',
                        data: Utils.numbers(NUMBER_CFG),
                        backgroundColor: Utils.CHART_COLORS.yellow,
                    }
                ]
            };

            let delayed;
            const config = {
                type: 'bar',
                data: data,
                options: {
                    animation: {
                        onComplete: () => {
                            delayed = true;
                        },
                        delay: (context) => {
                            let delay = 0;
                            if (context.type === 'data' && context.mode === 'default' && !delayed) {
                                delay = context.dataIndex * 300 + context.datasetIndex * 100;
                            }
                            return delay;
                        },
                    },
                    scales: {
                        x: {
                            stacked: true,
                        },
                        y: {
                            stacked: true
                        }
                    }
                }
            };

            const actions = [
                {
                    name: 'Randomize',
                    handler(chart) {
                        chart.data.datasets.forEach(dataset => {
                            dataset.data = Utils.numbers({ count: chart.data.labels.length, min: 0, max: 100 });
                        });
                        chart.update();
                    }
                },
            ];

            const ctx = document.getElementById("chart");
            const myChart = new Chart(ctx, config);

            // Button trigger
            document.getElementById("randomizeBtn").addEventListener("click", () => {
                actions[0].handler(myChart);
            });
        </script>

    </div>

    <div class="text-center mt-2">


        <div class="mt-5">
            <a href="report.html" class="bg-yellow-500 px-5 py-2 rounded text-white mr-2">Report Issue</a>
            <a href="reports.html" class="bg-blue-500 px-5 py-2 rounded text-white">View Reports</a>
        </div>
    </div>

</body>

</html>
