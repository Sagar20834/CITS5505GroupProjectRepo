<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue | RoadWatch Perth</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body class="page-shell">
  <nav class="navbar custom-navbar">
    <div class="container d-flex justify-content-between align-items-center gap-3">
      <a class="navbar-brand" href="index.html">RoadWatch Perth</a>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="active-link" href="report.html">Report Issue</a>
        <a href="dashboard.html">Dashboard</a>
        <a class="btn nav-login-btn" href="login.html">Login</a>
        <a class="btn nav-signup-btn" href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container">
      <div class="page-card">
        <p class="page-kicker">Community Reporting</p>
        <h2>Report Issue</h2>
        <p class="page-lead">Submit a road problem with enough detail to help track and prioritize it.</p>

        <div class="row g-3">
          <div class="col-12">
            <input class="form-control-custom" placeholder="Issue Type">
          </div>
          <div class="col-12">
            <input class="form-control-custom" placeholder="Location">
          </div>
          <div class="col-12">
            <textarea class="form-textarea-custom" placeholder="Description"></textarea>
          </div>
          <div class="col-12">
            <input class="form-control" type="file">
          </div>
        </div>

        <div class="hero-actions justify-content-between mt-4">
          <button class="btn page-secondary-btn" type="button">Submit As User</button>
          <button class="btn page-secondary-btn" type="button">Submit Anonymously</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-section text-center py-3">
    <div class="container">
      <p class="mb-0">RoadWatch Perth - Community reporting for safer roads.</p>
    </div>
  </footer>
</body>
</html>
