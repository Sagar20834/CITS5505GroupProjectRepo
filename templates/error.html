{% extends "base.html" %}

{% block title %}{{ title }} | RoadWatch Perth{% endblock %}

{% block content %}
  <div class="mx-auto max-w-3xl rounded-2xl border border-slate-200 bg-white p-10 text-center shadow-lg">
    <p class="mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700">RoadWatch Perth</p>
    <h1 class="mb-4 text-4xl font-bold text-slate-900">{{ heading }}</h1>
    <p class="mx-auto max-w-2xl text-lg leading-8 text-slate-600">{{ message }}</p>
    <div class="mt-8 flex flex-wrap justify-center gap-4">
      <a href="{{ url_for('main.index') }}" class="rounded-2xl bg-blue-500 px-6 py-3 text-lg font-semibold text-white no-underline hover:bg-blue-600">Return Home</a>
      <a href="{{ url_for('reports.list_reports') }}" class="rounded-2xl border border-slate-300 px-6 py-3 text-lg font-semibold text-slate-700 no-underline hover:bg-slate-50">View Reports</a>
    </div>
  </div>
{% endblock %}
