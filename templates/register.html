{% extends "base.html" %}

{% block title %}Register | RoadWatch Perth{% endblock %}

{% block content %}
  <div class="rw-panel rw-reveal mx-auto max-w-xl rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 shadow-lg sm:p-8">
    <p class="rw-kicker mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700 dark:text-blue-300">Create Account</p>
    <h1 class="mb-3 text-3xl font-bold text-slate-900 dark:text-slate-100 sm:text-4xl">Register</h1>
    <p class="mb-8 text-lg leading-8 text-slate-600 dark:text-slate-300">Create an account to submit linked reports, track progress, and manage your own submissions.</p>

    <form method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Username</label>
        <input id="username" name="username" value="{{ form_data.username }}" class="rw-field w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" placeholder="Choose a username" required>
      </div>

      <div>
        <label for="email" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Email address</label>
        <input id="email" name="email" value="{{ form_data.email }}" class="rw-field w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" type="email" placeholder="name@example.com" required>
      </div>

      <div>
        <label for="password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Password</label>
        <input id="password" name="password" class="rw-field w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" type="password" placeholder="At least 8 characters" required>
      </div>

      <div>
        <label for="confirm_password" class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">Confirm password</label>
        <input id="confirm_password" name="confirm_password" class="rw-field w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 dark:border-slate-600 dark:bg-slate-950 dark:text-slate-100 dark:placeholder:text-slate-500" type="password" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="rw-btn rw-btn-warning w-full rounded-2xl bg-amber-500 dark:bg-amber-400 px-6 py-4 text-lg font-semibold text-slate-900 hover:bg-amber-400">Register</button>
    </form>

    <p class="mt-4 text-base text-slate-600 dark:text-slate-300">Already have an account? <a href="{{ url_for('auth.login') }}" class="font-medium text-blue-600 dark:text-blue-300">Login</a></p>
  </div>
{% endblock %}
