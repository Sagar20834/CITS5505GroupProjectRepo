{% extends "base.html" %}

{% block title %}Register | RoadWatch Perth{% endblock %}

{% block content %}
  <div class="mx-auto max-w-xl rounded-2xl border border-slate-200 bg-white p-8 shadow-lg">
    <p class="mb-3 text-sm font-bold uppercase tracking-[0.28em] text-blue-700">Create Account</p>
    <h1 class="mb-3 text-4xl font-bold text-slate-900">Register</h1>
    <p class="mb-8 text-lg leading-8 text-slate-600">Create an account to submit linked reports, track progress, and manage your own submissions.</p>

    <form method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="mb-2 block text-sm font-semibold text-slate-600">Username</label>
        <input id="username" name="username" value="{{ form_data.username }}" class="w-full rounded-xl border border-slate-300 px-4 py-3" placeholder="Choose a username" required>
      </div>

      <div>
        <label for="email" class="mb-2 block text-sm font-semibold text-slate-600">Email address</label>
        <input id="email" name="email" value="{{ form_data.email }}" class="w-full rounded-xl border border-slate-300 px-4 py-3" type="email" placeholder="name@example.com" required>
      </div>

      <div>
        <label for="password" class="mb-2 block text-sm font-semibold text-slate-600">Password</label>
        <input id="password" name="password" class="w-full rounded-xl border border-slate-300 px-4 py-3" type="password" placeholder="At least 8 characters" required>
      </div>

      <div>
        <label for="confirm_password" class="mb-2 block text-sm font-semibold text-slate-600">Confirm password</label>
        <input id="confirm_password" name="confirm_password" class="w-full rounded-xl border border-slate-300 px-4 py-3" type="password" placeholder="Re-enter your password" required>
      </div>

      <button type="submit" class="w-full rounded-2xl bg-amber-500 px-6 py-4 text-lg font-semibold text-slate-900 hover:bg-amber-400">Register</button>
    </form>

    <p class="mt-4 text-base text-slate-600">Already have an account? <a href="{{ url_for('auth.login') }}" class="font-medium text-blue-600">Login</a></p>
  </div>
{% endblock %}
