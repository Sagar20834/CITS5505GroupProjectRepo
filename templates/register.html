<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | RoadWatch Perth</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body class="page-shell">
  <nav class="navbar custom-navbar">
    <div class="container d-flex justify-content-between align-items-center gap-3">
      <a class="navbar-brand" href="index.html">RoadWatch Perth</a>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="report.html">Report Issue</a>
        <a href="dashboard.html">Dashboard</a>
        <a class="btn nav-login-btn" href="login.html">Login</a>
        <a class="btn nav-signup-btn active-link" href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container">
      <div class="page-card narrow">
        <p class="page-kicker">Create Account</p>
        <h2>Register</h2>
        <p class="page-lead">Join RoadWatch Perth and start contributing to safer local roads.</p>

        <div class="row g-3">
          <div class="col-12">
            <input class="form-control-custom" placeholder="Username">
          </div>
          <div class="col-12">
            <input class="form-control-custom" type="password" placeholder="Password">
          </div>
        </div>

        <button class="btn page-primary-btn w-100 mt-4" type="button">Register</button>
      </div>
    </div>
  </main>

  <footer class="footer-section text-center py-3">
    <div class="container">
      <p class="mb-0">RoadWatch Perth - Community reporting for safer roads.</p>
    </div>
  </footer>
</body>
</html>
