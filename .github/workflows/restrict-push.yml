name: Restrict Push
on:
  push:
    branches:
      - main
      - sagar
      - dipta-test
      - harshil
      - ziqi_branch

jobs:
  restrict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check push permissions
        run: |
          USER="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"

          echo "User: $USER"
          echo "Branch: $BRANCH"

          # Define allowed branches per user
          case "$USER" in
            Sagar20834)
              ALLOWED="main|sagar"
              ;;
            diptadg)
              ALLOWED="dipta-test"
              ;;
            Harshil8802)
              ALLOWED="harshil"
              ;;
            Jiongge390)
              ALLOWED="ziqi_branch"
              ;;
            *)
              echo "❌ Error: Unknown user '$USER' is not allowed to push to any protected branch."
              exit 1
              ;;
          esac

          if echo "$BRANCH" | grep -qE "^($ALLOWED)$"; then
            echo "✅ User '$USER' is allowed to push to '$BRANCH'."
          else
            echo "❌ Error: User '$USER' is not allowed to push to '$BRANCH'."
            echo "   Your allowed branch(es): $ALLOWED"
            exit 1
          fi